apis:
  - aid: clicksend-sms:rest-api-v3
    name: ClickSend REST API v3
    description: >-
      REST API v3 for ClickSend covering SMS, MMS, voice broadcasts, email,
      fax, post letters and postcards, contact lists, accounts, subaccounts,
      and webhook subscriptions. Authentication uses HTTP Basic Auth with
      account username and API key. An OpenAPI/Swagger specification is
      published in the official ClickSend SDK repositories on GitHub.
    humanURL: https://developers.clicksend.com/docs/
    baseURL: https://rest.clicksend.com/v3
