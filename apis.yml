aid: clicksend-sms
name: ClickSend SMS
description: >-
  ClickSend is a global business communications platform for sending and
  receiving SMS, MMS, voice, email, fax, and physical post via API or web
  dashboard, with direct carrier routing and a 99.95% uptime SLA. The
  ClickSend REST API v3 provides endpoints for SMS, MMS, voice, email, fax,
  post letters, contacts, accounts, and webhooks, secured with HTTP Basic
  Authentication using a username and API key.
type: Index
